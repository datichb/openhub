name: CI — Shell & Agents

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          shellcheck --severity=warning \
            oc.sh \
            scripts/cmd-*.sh \
            scripts/lib/*.sh \
            scripts/adapters/*.sh

  validate-agents:
    name: Validate agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required frontmatter fields in agents/
        run: |
          errors=0
          for agent_file in $(find agents/ -name "*.md" | sort); do
            [ -f "$agent_file" ] || continue
            name=$(basename "$agent_file")

            for field in id label description targets skills; do
              if ! grep -q "^${field}:" "$agent_file"; then
                echo "::error file=${agent_file}::Champ frontmatter manquant : '${field}' dans ${name}"
                errors=$((errors + 1))
              fi
            done
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "::error::$errors erreur(s) de frontmatter détectée(s) dans agents/"
            exit 1
          fi

          echo "Tous les agents ont un frontmatter valide."

  check-staleness:
    name: Check deployed agents are up to date
    runs-on: ubuntu-latest
    continue-on-error: true   # Informatif en CI — ne bloque pas le merge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check staleness (opencode target — hub level)
        run: |
          echo "Vérification de la fraîcheur des agents déployés au niveau du hub..."
          bash scripts/cmd-deploy.sh --check opencode || {
            echo "::warning::Des agents déployés sont obsolètes. Relancez : ./oc.sh deploy"
          }

  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run bats tests
        run: for f in tests/*.bats; do bats "$f" || exit 1; done

  version-consistency:
    name: Check version consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Verify hub.json.example version matches latest CHANGELOG entry
        run: |
          example_version=$(jq -r '.version' config/hub.json.example)

          # Extraire la dernière version taguée depuis CHANGELOG.md (ex: ## [1.5.0] — 2026-01-01)
          changelog_version=$(grep -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          echo "Version dans hub.json.example : ${example_version}"
          echo "Dernière version dans CHANGELOG : ${changelog_version}"

          if [ -z "$changelog_version" ]; then
            echo "::warning::Aucune version trouvée dans CHANGELOG.md — vérification ignorée"
            exit 0
          fi

          if [ "$example_version" != "$changelog_version" ]; then
            echo "::error::Dérive de version détectée : hub.json.example=${example_version} ≠ CHANGELOG=${changelog_version}"
            echo "Lancez scripts/release.sh pour synchroniser les versions."
            exit 1
          fi

          echo "Versions cohérentes : ${example_version}"
