name: WebSearch Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'agents/auditor/**'
      - 'agents/planning/**'
      - 'agents/design/**'
      - 'agents/documentation/**'
      - 'skills/**/websearch-*.md'
      - 'skills/shared/websearch-usage.md'
      - 'scripts/cmd-config.sh'
      - 'tests/test_*websearch*.bats'
      - '.github/workflows/test-websearch.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'scripts/cmd-config.sh'
      - 'tests/test_*websearch*.bats'

jobs:
  test-websearch-config:
    name: Test WebSearch Config Script
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install bats-core (official, latest stable)
        run: |
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          sudo apt-get install -y jq
      
      - name: Make scripts executable
        run: |
          find scripts -name "*.sh" -exec chmod +x {} \;
          chmod +x oc.sh
      
      - name: Run config tests
        run: bats tests/test_cmd_config_websearch.bats
        env:
          BATS_TEST_DIRNAME: ${{ github.workspace }}/tests
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: websearch-config-test-results
          path: |
            tests/test_cmd_config_websearch.bats
          retention-days: 7

  test-websearch-agents:
    name: Validate WebSearch Agents
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install bats-core (official, latest stable)
        run: |
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      
      - name: Run agent validation tests
        run: bats tests/test_agents_websearch.bats
        env:
          BATS_TEST_DIRNAME: ${{ github.workspace }}/tests
      
      - name: Verify 7 agents have websearch
        run: |
          echo "Checking that exactly 7 agents have websearch permissions..."
          count=$(grep -r "websearch: allow" agents/ | wc -l)
          echo "Found $count agents with websearch: allow"
          if [ "$count" -ne 7 ]; then
            echo "::error::Expected 7 agents with websearch, found $count"
            exit 1
          fi
          echo "✅ All 7 agents have websearch permissions"

  test-websearch-skills:
    name: Validate WebSearch Skills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install bats-core (official, latest stable)
        run: |
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      
      - name: Run skill validation tests
        run: bats tests/test_skills_websearch.bats
        env:
          BATS_TEST_DIRNAME: ${{ github.workspace }}/tests
      
      - name: Verify skill files exist
        run: |
          echo "Checking that all 5 websearch skills exist..."
          skills=(
            "skills/shared/websearch-usage.md"
            "skills/auditor/websearch-cve-lookup.md"
            "skills/auditor/websearch-performance-research.md"
            "skills/planning/websearch-stack-research.md"
            "skills/design/websearch-design-patterns.md"
          )
          
          missing=0
          for skill in "${skills[@]}"; do
            if [ ! -f "$skill" ]; then
              echo "::error::Missing skill file: $skill"
              missing=$((missing + 1))
            else
              echo "✅ Found: $skill"
            fi
          done
          
          if [ "$missing" -gt 0 ]; then
            exit 1
          fi
          echo "✅ All 5 websearch skills exist"

  test-websearch-integration:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-websearch-config, test-websearch-agents, test-websearch-skills]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install bats-core (official, latest stable)
        run: |
          git clone --depth 1 --branch v1.11.1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          sudo apt-get install -y parallel jq
          mkdir -p ~/.parallel && touch ~/.parallel/will-cite
      
      - name: Make scripts executable
        run: |
          find scripts -name "*.sh" -exec chmod +x {} \;
          chmod +x oc.sh
      
      - name: Run all WebSearch tests
        run: bats -j 4 tests/test_*websearch*.bats
        env:
          BATS_TEST_DIRNAME: ${{ github.workspace }}/tests
      
      - name: Summary
        run: |
          echo "## WebSearch Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All WebSearch tests passed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Config tests: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Agent validation: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Skill validation: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Integration: ✅ Passed" >> $GITHUB_STEP_SUMMARY
