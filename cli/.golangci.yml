version: "2"
linters:
  enable:
    - bodyclose
    - gocritic
    - misspell
    - nilerr
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      ignore-rules:
        - commandes
        - correspondants
        - existant
        - documentaire
        - strat
        - respecte
        - statuts
        - activit
        - conflit
        - normalis
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
        path: _test\.go
      - linters:
          - errcheck
        path: cmd/
        text: fmt\.Fprint
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
